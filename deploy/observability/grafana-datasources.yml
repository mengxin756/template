# Grafana Datasources Configuration
apiVersion: 1

datasources:
  # Loki - Log Aggregation
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link traces from logs to Tempo
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasource: Tempo
          urlDisplayLabel: 'View Trace'

  # Tempo - Distributed Tracing
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: 'loki'
        tags: ['service', 'operation']
        mapTagNamesEnabled: true
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: true
      serviceMap:
        datasourceUid: 'prometheus'
      search:
        hide: false
      nodeGraph:
        enabled: true
      tracesToMetrics:
        datasourceUid: 'prometheus'
        tags: ['service']
        queries:
          - name: 'Request Rate'
            query: 'sum(rate(http_server_request_duration_seconds_count{service="$__tags.service"}[5m]))'
          - name: 'Error Rate'
            query: 'sum(rate(http_server_request_duration_seconds_count{service="$__tags.service",status_code=~"5.."}[5m]))'

  # Prometheus - Metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: false
    editable: false
    jsonData:
      timeInterval: '15s'
      queryTimeout: '60s'
