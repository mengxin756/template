# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'Classic API Dashboards'
    orgId: 1
    folder: 'Classic API'
    folderUid: 'classic-api'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
