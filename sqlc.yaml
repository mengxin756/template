version: "2"
sql:
  - engine: "mysql"
    schema: "internal/data/schema.sql"
    queries: "internal/data/queries/"
    gen:
      go:
        package: "db"
        out: "internal/data/db"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "mysql:datetime"
            go_type: "time.Time"
          - db_type: "mysql:timestamp"
            go_type: "time.Time"
          - db_type: "mysql:tinyint"
            go_type: "int8"
